name: IP归属地标注（离线+在线保障）

on:
  push:
    paths:
      - 'ips/*'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'   # 每周一自动运行，保持数据新鲜

jobs:
  annotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install ip-region requests

      # ========== 执行标注 ==========
      - name: 批量标注 IP
        run: |
          rm -rf results
          mkdir -p results
          echo "====== 开始处理 ips 文件夹内所有文件 ======"
          
          python3 << 'EOF'
          import os
          import glob
          import sys
          import time
          import requests
          from ipregion import IP2Region

          # 精简备用映射表
          CUSTOM_MAP = {
              "中国": "CN", "台湾": "TW", "香港": "HK", "澳门": "MO",
              "美国": "US", "加拿大": "CA", "墨西哥": "MX",
              "日本": "JP", "韩国": "KR", "新加坡": "SG", "印度": "IN",
              "英国": "GB", "德国": "DE", "法国": "FR", "意大利": "IT",
              "西班牙": "ES", "荷兰": "NL", "瑞士": "CH", "瑞典": "SE",
              "俄罗斯": "RU", "澳大利亚": "AU", "新西兰": "NZ",
              "巴西": "BR", "阿根廷": "AR", "南非": "ZA",
              "阿联酋": "AE", "沙特阿拉伯": "SA", "土耳其": "TR",
              "泰国": "TH", "越南": "VN", "马来西亚": "MY", "菲律宾": "PH",
              "印度尼西亚": "ID",
          }

          try:
              ip2region = IP2Region()
              print("✅ ip-region 离线库加载成功")
          except Exception as e:
              print(f"❌ ip-region 加载失败: {e}")
              sys.exit(1)

          def query_online_api(ip):
              """作为后备的在线 API 查询"""
              # 使用 ip-api.com，它无需 API Key，支持国家代码查询
              url = f"http://ip-api.com/json/{ip}?fields=countryCode"
              try:
                  resp = requests.get(url, timeout=5)
                  if resp.status_code == 200:
                      data = resp.json()
                      return data.get('countryCode', 'UNKNOWN')
              except:
                  pass
              return 'UNKNOWN'

          def get_country_code(ip):
              # 1. 优先使用离线库 ip-region
              try:
                  res = ip2region.search(ip)
                  if res and res != "0|0|0|内网IP|0":
                      parts = res.split('|')
                      if len(parts) >= 5 and parts[4] and len(parts[4]) == 2:
                          return parts[4].upper()
                      if res in CUSTOM_MAP:
                          return CUSTOM_MAP[res]
                      return res[:2].upper()
              except:
                  pass

              # 2. 离线库失败，尝试在线 API
              online_code = query_online_api(ip)
              if online_code != 'UNKNOWN':
                  print(f"  ⚡ 离线库未命中，在线API成功: {ip} -> {online_code}")
                  return online_code

              # 3. 全部失败
              return "UNKNOWN"

          files = glob.glob("ips/*")
          if not files:
              print("⚠️ ips 文件夹为空，没有文件需要处理。")
          else:
              for file_path in files:
                  if not os.path.isfile(file_path):
                      continue
                  base = os.path.basename(file_path)
                  out_path = f"results/{base}_标注.txt"
                  print(f"处理文件: {file_path} -> {out_path}")
                  
                  with open(file_path, "r", encoding="utf-8") as fin, \
                       open(out_path, "w", encoding="utf-8") as fout:
                      for line in fin:
                          ip = line.strip()
                          if not ip or ip.startswith('#'):
                              continue
                          code = get_country_code(ip)
                          fout.write(f"{ip} #{code}\n")
                          time.sleep(0.1) # 避免 API 请求过于频繁
          EOF
          
          echo "====== 处理完成 ======"
          echo "results 文件夹内容:"
          ls -la results/

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "结果无变化，跳过提交"
          else
            git commit -m "🤖 自动更新 IP 标注结果（离线+在线保障）"
            git pull --rebase origin main
            git push origin main
          fi
