name: IP 归属地标注

on:
  push:
    paths:
      - 'ips/*'
  workflow_dispatch:

jobs:
  annotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 安装 nali
        run: |
          wget https://github.com/zu1k/nali/releases/download/v0.8.1/nali-linux-amd64-v0.8.1.gz
          gunzip nali-linux-amd64-v0.8.1.gz
          chmod +x nali-linux-amd64-v0.8.1
          sudo mv nali-linux-amd64-v0.8.1 /usr/local/bin/nali

      - name: 初始化 nali
        run: nali update

      - name: 批量标注 IP
        run: |
          echo "====== 开始处理 IP 文件 ======"
          mkdir -p results
          echo "当前工作目录: $(pwd)"
          echo "ips 文件夹内容:"
          ls -la ips/ || echo "ips 文件夹不存在或为空"
          
          for f in ips/*; do
            if [ -f "$f" ]; then
              name=$(basename "$f")
              echo "正在处理文件: $f -> results/${name}_标注.txt"
              cat "$f" | nali > "results/${name}_标注.txt"
              echo "生成结果文件行数: $(wc -l < "results/${name}_标注.txt")"
            else
              echo "跳过非文件项: $f"
            fi
          done
          
          echo "====== results 文件夹内容 ======"
          ls -la results/ || echo "results 文件夹为空"

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "没有新的更改需要提交"
          else
            git commit -m "🤖 自动更新 IP 标注结果"
            git pull --rebase origin main
            git push origin main
            echo "结果已推送到仓库"
          fi
