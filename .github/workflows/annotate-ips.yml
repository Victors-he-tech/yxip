name: IP 归属地标注

于:
  push:
    paths:
      - 'ip ku/*.txt'
  workflow_dispatch:

jobs:
  annotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 安装 nali
        run: |
          wget https://github.com/zu1k/nali/releases/download/v0.8.1/nali-linux-amd64-v0.8.1.gz
          gunzip nali-linux-amd64-v0.8.1.gz
          chmod +x nali-linux-amd64-v0.8.1
          sudo mv nali-linux-amd64-v0.8.1 /usr/local/bin/nali

      - name: 初始化 nali (下载IP数据库)
        run: nali update

      - name: 批量标注 IP
        run: |
          mkdir -p results
          for f in ips/*.txt; do
            name=$(basename "$f" .txt)
            cat "$f" | nali > "results/${name}_标注.txt"
          done

      - name: 提交结果
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add results/
          git diff --quiet || git commit -m "自动更新 IP 标注结果"
          git push
