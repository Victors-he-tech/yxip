name: IP归属地标注（使用ip-region库）

on:
  push:
    paths:
      - 'ips/*'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'   # 每周一自动更新

jobs:
  annotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 换用更简单的 ip-region 库，它内置了数据库，无需手动下载
      - name: 安装依赖
        run: pip install ip-region

      - name: 批量标注 IP（每个文件单独输出）
        run: |
          mkdir -p results
          echo "====== 开始处理 ips 文件夹内所有文件 ======"
          
          python3 << 'EOF'
          import os
          import glob
          from ipregion import IP2Region

          # 精简常用国家/地区映射表（中文名 -> 两位代码）
          CODE_MAP = {
              "中国": "CN", "台湾": "TW", "香港": "HK", "澳门": "MO",
              "美国": "US", "加拿大": "CA", "墨西哥": "MX",
              "日本": "JP", "韩国": "KR", "新加坡": "SG", "印度": "IN",
              "英国": "GB", "德国": "DE", "法国": "FR", "意大利": "IT",
              "西班牙": "ES", "荷兰": "NL", "瑞士": "CH", "瑞典": "SE",
              "俄罗斯": "RU", "澳大利亚": "AU", "新西兰": "NZ",
              "巴西": "BR", "阿根廷": "AR", "南非": "ZA",
              "阿联酋": "AE", "沙特阿拉伯": "SA", "土耳其": "TR",
              "泰国": "TH", "越南": "VN", "马来西亚": "MY", "菲律宾": "PH",
              "印度尼西亚": "ID", "未知": "UNKNOWN"
          }

          # 初始化查询器（它会自动处理数据库）
          ip2region = IP2Region()

          def get_country_code(ip):
              try:
                  # 查询，返回结果格式为 "国家|区域|省份|城市|ISP"
                  result = ip2region.search(ip)
                  if result:
                      country_cn = result.split('|')[0]
                      return CODE_MAP.get(country_cn, country_cn[:2].upper())
              except:
                  pass
              return "UNKNOWN"

          # 遍历 ips 下所有文件（排除目录）
          for file_path in glob.glob("ips/*"):
              if not os.path.isfile(file_path):
                  continue
              base = os.path.basename(file_path)
              out_path = f"results/{base}_标注.txt"
              print(f"处理文件: {file_path} -> {out_path}")
              
              with open(file_path, "r", encoding="utf-8") as fin, \
                   open(out_path, "w", encoding="utf-8") as fout:
                  for line in fin:
                      ip = line.strip()
                      if not ip or ip.startswith('#'):
                          continue
                      code = get_country_code(ip)
                      fout.write(f"{ip} #{code}\n")
          EOF
          
          echo "====== 处理完成 ======"
          ls -la results/

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "结果无变化，跳过提交"
          else
            git commit -m "🤖 自动更新 IP 标注结果"
            git pull --rebase origin main
            git push origin main
          fi
