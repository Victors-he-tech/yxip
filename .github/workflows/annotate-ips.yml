name: IP归属地标注（ip-region·免注册）

on:
  push:
    paths:
      - 'ips/*'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'   # 每周一自动运行，保持数据新鲜

jobs:
  annotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 ip-region
        run: pip install ip-region

      # ========== 执行标注 ==========
      - name: 批量标注 IP
        run: |
          rm -rf results
          mkdir -p results
          echo "====== 开始处理 ips 文件夹内所有文件 ======"
          
          python3 << 'EOF'
          import os
          import glob
          import sys
          from ipregion import IP2Region

          # 精简备用映射表
          CUSTOM_MAP = {
              "中国": "CN", "台湾": "TW", "香港": "HK", "澳门": "MO",
              "美国": "US", "加拿大": "CA", "墨西哥": "MX",
              "日本": "JP", "韩国": "KR", "新加坡": "SG", "印度": "IN",
              "英国": "GB", "德国": "DE", "法国": "FR", "意大利": "IT",
              "西班牙": "ES", "荷兰": "NL", "瑞士": "CH", "瑞典": "SE",
              "俄罗斯": "RU", "澳大利亚": "AU", "新西兰": "NZ",
              "巴西": "BR", "阿根廷": "AR", "南非": "ZA",
              "阿联酋": "AE", "沙特阿拉伯": "SA", "土耳其": "TR",
              "泰国": "TH", "越南": "VN", "马来西亚": "MY", "菲律宾": "PH",
              "印度尼西亚": "ID",
          }

          try:
              ip2region = IP2Region()
              print("✅ ip-region 加载成功")
          except Exception as e:
              print(f"❌ ip-region 加载失败: {e}")
              sys.exit(1)

          def get_country_code(ip):
              try:
                  res = ip2region.search(ip)
                  if not res:
                      return "UNKNOWN"
                  # 解析返回的国家/地区代码，格式： "国家代码" 或 "国家|省份|城市|ISP|国家代码"
                  parts = res.split('|')
                  if len(parts) >= 5 and parts[4]:
                      return parts[4].upper()
                  # 如果返回的是中文国名，从映射表中查找
                  if res in CUSTOM_MAP:
                      return CUSTOM_MAP[res]
                  # 如果都不是，返回前两个字符的大写形式作为备用
                  return res[:2].upper()
              except Exception as e:
                  return "UNKNOWN"

          files = glob.glob("ips/*")
          if not files:
              print("⚠️ ips 文件夹为空，没有文件需要处理。")
          else:
              for file_path in files:
                  if not os.path.isfile(file_path):
                      continue
                  base = os.path.basename(file_path)
                  out_path = f"results/{base}_标注.txt"
                  print(f"处理文件: {file_path} -> {out_path}")
                  
                  with open(file_path, "r", encoding="utf-8") as fin, \
                       open(out_path, "w", encoding="utf-8") as fout:
                      for line in fin:
                          ip = line.strip()
                          if not ip or ip.startswith('#'):
                              continue
                          code = get_country_code(ip)
                          fout.write(f"{ip} #{code}\n")
          EOF
          
          echo "====== 处理完成 ======"
          echo "results 文件夹内容:"
          ls -la results/

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "结果无变化，跳过提交"
          else
            git commit -m "🤖 自动更新 IP 标注结果"
            git pull --rebase origin main
            git push origin main
          fi
