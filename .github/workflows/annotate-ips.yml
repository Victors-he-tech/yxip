name: IP归属地标注（双离线库保障）

on:
  push:
    paths:
      - 'ips/*'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'   # 每周一自动更新数据库缓存

jobs:
  annotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 安装 ip2region 和 IP2Location 两个库
      - name: 安装依赖
        run: pip install ip2region IP2Location

      # --- 缓存 ip2region 数据库 ---
      - name: 缓存 ip2region 数据库
        id: cache-ip2region
        uses: actions/cache@v4
        with:
          path: ip2region.xdb
          key: ip2region-db-${{ github.run_number }}
          restore-keys: ip2region-db-

      - name: 下载 ip2region 数据库（若缓存未命中）
        if: steps.cache-ip2region.outputs.cache-hit != 'true'
        run: |
          echo "下载 ip2region 数据库..."
          wget -O ip2region.xdb https://raw.githubusercontent.com/lionsoul2014/ip2region/master/data/ip2region.xdb

      # --- 缓存 IP2Location LITE 数据库 ---
      - name: 缓存 IP2Location LITE 数据库
        id: cache-ip2location
        uses: actions/cache@v4
        with:
          path: IP2LOCATION-LITE-DB1.BIN
          key: ip2location-lite-${{ github.run_number }}
          restore-keys: ip2location-lite-

      # 下载 IP2Location LITE 数据库（免费，无需注册）
      - name: 下载 IP2Location LITE 数据库（若缓存未命中）
        if: steps.cache-ip2location.outputs.cache-hit != 'true'
        run: |
          echo "下载 IP2Location LITE 数据库（免费版）..."
          wget -O IP2LOCATION-LITE-DB1.BIN.ZIP https://download.ip2location.com/lite/IP2LOCATION-LITE-DB1.BIN.ZIP
          unzip -o IP2LOCATION-LITE-DB1.BIN.ZIP
          rm IP2LOCATION-LITE-DB1.BIN.ZIP

      # --- 执行标注（双库备份）---
      - name: 批量标注 IP（双库 Fallback）
        run: |
          mkdir -p results
          echo "====== 开始处理 ips 文件夹内所有文件 ======"
          
          python3 << 'EOF'
          import os
          import glob
          from ip2region import Ip2Region
          import IP2Location

          # 自定义中文国名映射表（备用）
          CUSTOM_MAP = {
              "中国": "CN", "台湾": "TW", "香港": "HK", "澳门": "MO",
              "美国": "US", "加拿大": "CA", "墨西哥": "MX",
              "日本": "JP", "韩国": "KR", "新加坡": "SG", "印度": "IN",
              "英国": "GB", "德国": "DE", "法国": "FR", "意大利": "IT",
              "西班牙": "ES", "荷兰": "NL", "瑞士": "CH", "瑞典": "SE",
              "俄罗斯": "RU", "澳大利亚": "AU", "新西兰": "NZ",
              "巴西": "BR", "阿根廷": "AR", "南非": "ZA",
              "阿联酋": "AE", "沙特阿拉伯": "SA", "土耳其": "TR",
              "泰国": "TH", "越南": "VN", "马来西亚": "MY", "菲律宾": "PH",
              "印度尼西亚": "ID",
          }

          # 初始化两个查询器
          ip2r = Ip2Region("ip2region.xdb")
          ip2l = IP2Location.IP2Location("IP2LOCATION-LITE-DB1.BIN")

          def get_country_code(ip):
              # 1. 首先尝试 ip2region
              try:
                  res = ip2r.search(ip)
                  if res:
                      # 如果返回格式为 "国家|省份|城市|ISP|国家代码"
                      parts = res.split('|')
                      # 优先使用内置国家代码
                      if len(parts) >= 5 and parts[4]:
                          return parts[4]
                      # 其次使用中文国名映射
                      cn = parts[0]
                      if cn in CUSTOM_MAP:
                          return CUSTOM_MAP[cn]
                      # 最后返回中文名前两字母作为备用
                      return cn[:2].upper()
              except:
                  pass

              # 2. 如果 ip2region 失败，尝试 IP2Location LITE
              try:
                  res = ip2l.get_country_short(ip)
                  if res:
                      return res
              except:
                  pass

              # 3. 都失败则返回 UNKNOWN
              return "UNKNOWN"

          # 遍历 ips 下所有文件（排除目录）
          for file_path in glob.glob("ips/*"):
              if not os.path.isfile(file_path):
                  continue
              base = os.path.basename(file_path)
              out_path = f"results/{base}_标注.txt"
              print(f"处理文件: {file_path} -> {out_path}")
              
              with open(file_path, "r", encoding="utf-8") as fin, \
                   open(out_path, "w", encoding="utf-8") as fout:
                  for line in fin:
                      ip = line.strip()
                      if not ip or ip.startswith('#'):
                          continue
                      code = get_country_code(ip)
                      fout.write(f"{ip} #{code}\n")

          ip2l.close()
          EOF
          
          echo "====== 处理完成 ======"
          ls -la results/

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "结果无变化，跳过提交"
          else
            git commit -m "🤖 自动更新 IP 标注结果（双离线库保障）"
            git pull --rebase origin main
            git push origin main
          fi
