name: IP归属地标注（ip2region·免注册稳定版）

on:
  push:
    paths:
      - 'ips/*'
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1'   # 每周一自动运行，保持数据库缓存新鲜

jobs:
  annotate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install py-ip2region

      # ========== ip2region 数据库（唯一数据源）==========
      - name: 缓存 ip2region 数据库
        id: cache-db
        uses: actions/cache@v4
        with:
          path: ip2region_v4.xdb
          key: ip2region-db-${{ github.run_number }}
          restore-keys: ip2region-db-

      - name: 下载 ip2region 数据库（若缓存未命中）
        if: steps.cache-db.outputs.cache-hit != 'true'
        run: |
          echo "从 GitHub 官方源下载 ip2region 数据库..."
          wget -O ip2region_v4.xdb https://raw.githubusercontent.com/lionsoul2014/ip2region/master/data/ip2region_v4.xdb

      # ========== 执行标注 ==========
      - name: 批量标注 IP
        run: |
          rm -rf results
          mkdir -p results
          echo "====== 开始处理 ips 文件夹内所有文件 ======"
          
          python3 << 'EOF'
          import os
          import glob
          import sys
          from ip2region import Ip2Region

          # 精简备用映射表（当内置代码缺失时使用）
          CUSTOM_MAP = {
              "中国": "CN", "台湾": "TW", "香港": "HK", "澳门": "MO",
              "美国": "US", "加拿大": "CA", "墨西哥": "MX",
              "日本": "JP", "韩国": "KR", "新加坡": "SG", "印度": "IN",
              "英国": "GB", "德国": "DE", "法国": "FR", "意大利": "IT",
              "西班牙": "ES", "荷兰": "NL", "瑞士": "CH", "瑞典": "SE",
              "俄罗斯": "RU", "澳大利亚": "AU", "新西兰": "NZ",
              "巴西": "BR", "阿根廷": "AR", "南非": "ZA",
              "阿联酋": "AE", "沙特阿拉伯": "SA", "土耳其": "TR",
              "泰国": "TH", "越南": "VN", "马来西亚": "MY", "菲律宾": "PH",
              "印度尼西亚": "ID",
          }

          try:
              searcher = Ip2Region("ip2region_v4.xdb")
              print("✅ ip2region 数据库加载成功")
          except Exception as e:
              print(f"❌ 数据库加载失败: {e}")
              sys.exit(1)

          def get_country_code(ip):
              try:
                  res = searcher.search(ip)
                  if not res:
                      return "UNKNOWN"
                  parts = res.split('|')
                  # 优先使用内置的两字母国家代码（通常在第5部分）
                  if len(parts) >= 5 and parts[4] and len(parts[4]) == 2:
                      return parts[4].upper()
                  # 其次使用中文国名映射
                  cn = parts[0]
                  if cn in CUSTOM_MAP:
                      return CUSTOM_MAP[cn]
                  # 最后尝试取中文名前两字母作为备用
                  if cn and cn != "未知":
                      return cn[:2].upper()
                  return "UNKNOWN"
              except Exception as e:
                  return "UNKNOWN"

          files = glob.glob("ips/*")
          if not files:
              print("⚠️ ips 文件夹为空，没有文件需要处理。")
          else:
              for file_path in files:
                  if not os.path.isfile(file_path):
                      continue
                  base = os.path.basename(file_path)
                  out_path = f"results/{base}_标注.txt"
                  print(f"处理文件: {file_path} -> {out_path}")
                  
                  with open(file_path, "r", encoding="utf-8") as fin, \
                       open(out_path, "w", encoding="utf-8") as fout:
                      for line in fin:
                          ip = line.strip()
                          if not ip or ip.startswith('#'):
                              continue
                          code = get_country_code(ip)
                          fout.write(f"{ip} #{code}\n")
          EOF
          
          echo "====== 处理完成 ======"
          echo "results 文件夹内容:"
          ls -la results/

      - name: 提交结果
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          if git diff --cached --quiet; then
            echo "结果无变化，跳过提交"
          else
            git commit -m "🤖 自动更新 IP 标注结果"
            git pull --rebase origin main
            git push origin main
          fi
